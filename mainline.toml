RemoteName = 'origin'
MainWorktree = '/Users/devrel/Projects/recallnet/mainline'
WorktreeLayoutPolicy = 'any'
WorktreeRootPrefix = ''
HookPolicy = 'inherit'

[integration]
Strategy = 'rebase-then-ff'
SyncPolicy = 'sync-before-integrate'
