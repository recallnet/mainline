name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Release build
        run: |
          go build ./cmd/mainline
          go build ./cmd/mainlined
