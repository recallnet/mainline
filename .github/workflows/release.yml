name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version for manual runs
        required: true
        default: dev

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release archives
        run: ./scripts/build-release.sh --version "${{ steps.version.outputs.value }}" --output dist

      - name: Generate Homebrew formula
        run: |
          ./scripts/generate-homebrew-formula.sh \
            --version "${{ steps.version.outputs.value }}" \
            --checksums dist/SHA256SUMS \
            --output dist/mainline.rb
          ruby -c dist/mainline.rb

      - name: Generate release manifest
        run: |
          ./scripts/generate-release-manifest.sh \
            --version "${{ steps.version.outputs.value }}" \
            --checksums dist/SHA256SUMS \
            --output dist/release-manifest.json

      - name: Package versioned release assets
        run: |
          ./scripts/package-release-assets.sh \
            --version "${{ steps.version.outputs.value }}" \
            --dist dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mainline-${{ steps.version.outputs.value }}
          path: dist/*

      - name: Publish GitHub release assets
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ steps.version.outputs.value }}
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/mainline.rb
            dist/mainline_*.rb
            dist/release-manifest.json
            dist/release-manifest_*.json
